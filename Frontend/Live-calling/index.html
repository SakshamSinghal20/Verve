<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verve</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
  <div class="logo">📹 Verve</div>
  <div id="datetime"></div>
</div>

<div class="main">

  <div class="sidebar">
    <div class="menu-item active">📅 Meetings</div>
    <div class="menu-item">📞 Calls</div>
  </div>

  <div class="content">
    <h1>Video calls and meetings for everyone</h1>
    <p>Connect, collaborate, and celebrate from anywhere with Verve</p>

    <div class="actions">
      <button class="btn-primary">➕ New meeting</button>
      <input class="input-box" placeholder="Enter a code or link">
    </div>

    <hr>

    <div class="illustration">🔗</div>

    <div class="footer-text">
      <h3>Get a link you can share</h3>
      <p>Click New meeting to get a link you can send to people</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
